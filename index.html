<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Física Teste Grátis - Gabarito Max</title>

<style>
:root{
  --card:#11141b;
  --card2:#171b24;
  --blue:#00f3ff;
  --pink:#ff00e6;
  --green:#39ff14;
  --red:#ff003c;
  --yellow:#ffd400;
  --text:#ffffff;
  --muted:#cfcfcf;
  --line:rgba(255,255,255,.08);
  --lock:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
  background:#000;
  color:var(--text);
  min-height:100vh;
  padding:20px 12px 40px;
  text-align:center;
  overflow-x:hidden;
}
header{
  max-width:1100px;
  margin:0 auto 24px;
  border:2px solid var(--blue);
  border-radius:24px;
  padding:22px 16px;
  background:linear-gradient(180deg,#0c0f16,#090b11);
  box-shadow:0 0 22px rgba(0,243,255,.22);
}
header h1{
  color:var(--blue);
  font-size:clamp(2rem,4vw,3rem);
  text-shadow:0 0 14px rgba(0,243,255,.7);
  font-weight:900;
}
header p{
  margin-top:10px;
  color:var(--pink);
  font-weight:800;
  font-size:clamp(1rem,2vw,1.3rem);
}
#app{width:100%;max-width:1100px;margin:0 auto}
.box{
  width:100%;
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px 16px;
  box-shadow:0 0 20px rgba(0,0,0,.35);
  overflow:hidden;
}
.btn{
  display:block;
  width:100%;
  max-width:560px;
  margin:10px auto;
  padding:14px 16px;
  border:2px solid var(--blue);
  background:transparent;
  color:#fff;
  border-radius:12px;
  cursor:pointer;
  font-weight:800;
  font-size:1rem;
  line-height:1.45;
  transition:.2s;
  white-space:normal;
  word-break:break-word;
}
.btn:hover:not(:disabled){
  background:var(--blue);
  color:#000;
  box-shadow:0 0 18px rgba(0,243,255,.35);
}
.btn-lock{
  border-color:var(--lock);
  color:#d1d5db;
  background:rgba(255,255,255,.03);
}
.btn-lock:hover{
  background:rgba(255,255,255,.08);
  color:#fff;
  box-shadow:none;
}
.btn-premium{
  border-color:var(--yellow);
  color:var(--yellow);
}
.btn-premium:hover:not(:disabled){
  background:var(--yellow);
  color:#000;
  box-shadow:0 0 18px rgba(255,212,0,.35);
}
.btn-voltar{border-color:#666;color:#ddd}
.btn-voltar:hover:not(:disabled){background:#333;color:#fff;box-shadow:none}
.btn.correct{background:var(--green)!important;border-color:var(--green)!important;color:#000!important}
.btn.wrong{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}
.grid-areas{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  margin-top:18px;
}
.card-area{
  background:linear-gradient(135deg,rgba(0,243,255,.08),rgba(255,0,230,.08));
  border:1px solid rgba(0,243,255,.16);
  border-radius:16px;
  padding:16px;
  text-align:left;
}
.card-area.locked{
  background:linear-gradient(135deg,rgba(107,114,128,.10),rgba(55,65,81,.12));
  border-color:rgba(107,114,128,.25);
}
.card-area h3{color:var(--blue);margin-bottom:8px;font-size:1.12rem}
.card-area.locked h3{color:#d1d5db}
.card-area p{color:#ddd;font-size:.95rem;line-height:1.45;margin-bottom:10px}
.status{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
  color:var(--pink);
  font-weight:bold;
  text-align:left;
}
#question-text{
  font-size:1.05rem;
  line-height:1.6;
  margin:20px 0;
  min-height:88px;
  text-align:left;
  word-break:break-word;
}
.question-label{
  display:block;
  color:var(--yellow);
  font-weight:bold;
  margin-bottom:8px;
}
.text-base{
  display:block;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:14px;
  margin:10px 0 14px;
  color:#f5f5f5;
  font-style:italic;
  line-height:1.65;
}
.options-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.option-btn{width:100%;max-width:100%;margin:0;text-align:left;min-height:58px}
.result-number{
  font-size:3rem;
  color:var(--blue);
  margin:12px 0;
  font-weight:900;
}
.result-sub{font-size:1.12rem;color:#ddd;margin-bottom:10px}
.mini{color:var(--muted);font-size:.96rem;line-height:1.5}
.lock-box{
  max-width:780px;
  margin:0 auto;
  background:linear-gradient(135deg,rgba(255,212,0,.10),rgba(255,0,230,.10));
  border:1px solid rgba(255,212,0,.25);
  border-radius:20px;
  padding:28px 18px;
  box-shadow:0 0 20px rgba(255,212,0,.12);
}
.lock-box h2{color:var(--yellow);font-size:2rem;margin-bottom:14px}
.lock-box p{color:#f3f4f6;line-height:1.6;margin-bottom:12px}
@media(max-width:700px){
  .grid-areas{grid-template-columns:1fr}
  .box{padding:16px 12px}
  #question-text{font-size:1rem}
  .btn{font-size:.96rem;padding:13px 12px}
}
</style>
</head>

<body>

<header>
  <h1>FÍSICA TESTE GRÁTIS</h1>
  <p>2 MÓDULOS LIBERADOS • 10 QUESTÕES CADA • RESTANTE BLOQUEADO</p>
</header>

<div id="app"></div>

<audio id="audio-bg" loop preload="auto" playsinline>
  <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=tension-103701.mp3" type="audio/mpeg">
</audio>

<audio id="audio-correct" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3" type="audio/mpeg">
</audio>

<audio id="audio-wrong" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=error-126627.mp3" type="audio/mpeg">
</audio>

<script>
const PREMIUM_URL = "COLE_AQUI_O_LINK_PREMIUM_DE_FISICA";

const app = document.getElementById("app");
const audioBg = document.getElementById("audio-bg");
const audioCorrect = document.getElementById("audio-correct");
const audioWrong = document.getElementById("audio-wrong");

audioBg.volume = 0.06;
audioCorrect.volume = 0.45;
audioWrong.volume = 0.45;

let audioLiberado = false;
let areaAtual = "";
let questoesAtuais = [];
let indiceQuestao = 0;
let acertosObjetivas = 0;
let questaoRenderizadaAtual = null;

document.addEventListener("click", destravarAudio, { once:true });
document.addEventListener("touchstart", destravarAudio, { once:true });

function destravarAudio(){
  if(audioLiberado) return Promise.resolve(true);
  audioBg.muted = true;
  return audioBg.play().then(()=>{
    audioBg.pause();
    audioBg.currentTime = 0;
    audioBg.muted = false;
    audioLiberado = true;

    audioCorrect.play().then(()=>{
      audioCorrect.pause();
      audioCorrect.currentTime = 0;
    }).catch(()=>{});

    audioWrong.play().then(()=>{
      audioWrong.pause();
      audioWrong.currentTime = 0;
    }).catch(()=>{});

    return true;
  }).catch(()=>false);
}

function tocarAudioFundo(){
  if(!audioLiberado) return;
  audioBg.currentTime = 0;
  audioBg.play().catch(()=>{});
}

function pararAudioFundo(){
  audioBg.pause();
  audioBg.currentTime = 0;
}

function tocarAcerto(){
  audioCorrect.currentTime = 0;
  audioCorrect.play().catch(()=>{});
}

function tocarErro(){
  audioWrong.currentTime = 0;
  audioWrong.play().catch(()=>{});
}

const areas = [
  {nome:"Cinemática",descricao:"Módulo liberado no teste grátis.",liberada:true},
  {nome:"Dinâmica",descricao:"Módulo liberado no teste grátis.",liberada:true},
  {nome:"Energia e Trabalho",descricao:"Disponível apenas na versão premium.",liberada:false},
  {nome:"Hidrostática",descricao:"Disponível apenas na versão premium.",liberada:false},
  {nome:"Termologia",descricao:"Disponível apenas na versão premium.",liberada:false},
  {nome:"Óptica",descricao:"Disponível apenas na versão premium.",liberada:false},
  {nome:"Ondulatória",descricao:"Disponível apenas na versão premium.",liberada:false},
  {nome:"Eletricidade",descricao:"Disponível apenas na versão premium.",liberada:false},
  {nome:"Magnetismo",descricao:"Disponível apenas na versão premium.",liberada:false},
  {nome:"Física Moderna e ENEM",descricao:"Disponível apenas na versão premium.",liberada:false}
];

function criarObjetiva(area, numero, textoBase, pergunta, alternativas, correta){
  return {tipo:"objetiva",area,numero,base:textoBase,q:pergunta,o:alternativas,c:correta};
}

function gerarAreaBase(nomeArea, perguntasObjetivas){
  return perguntasObjetivas.map((item,i)=>
    criarObjetiva(nomeArea,i+1,item.base,item.q,item.o,item.c)
  );
}

function embaralharAlternativas(questao){
  const pares = questao.o.map((texto,idx)=>({texto,correta:idx===questao.c}));
  for(let i=pares.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pares[i],pares[j]] = [pares[j],pares[i]];
  }
  return {
    ...questao,
    opcoesRenderizadas:pares.map(p=>p.texto),
    corretaRenderizada:pares.findIndex(p=>p.correta)
  };
}

const bancoQuestoes = {
  "Cinemática": gerarAreaBase("Cinemática", [
    {base:"Um carro percorre 120 km em 2 horas, mantendo velocidade constante.",q:"Qual é sua velocidade média?",o:["40 km/h","50 km/h","60 km/h","80 km/h"],c:2},
    {base:"Um ciclista percorre 30 km em 3 horas.",q:"A velocidade média do ciclista é:",o:["5 km/h","10 km/h","15 km/h","30 km/h"],c:1},
    {base:"Um objeto se move com velocidade constante em linha reta.",q:"Esse movimento é chamado de:",o:["MRU","MRUV","Queda livre","Movimento circular"],c:0},
    {base:"Em um movimento uniformemente variado, a velocidade muda com o tempo.",q:"A grandeza responsável pela variação da velocidade é:",o:["Massa","Aceleração","Peso","Temperatura"],c:1},
    {base:"Um carro parte do repouso e atinge 20 m/s em 5 s.",q:"Sua aceleração média é:",o:["2 m/s²","3 m/s²","4 m/s²","5 m/s²"],c:2},
    {base:"Um móvel tem velocidade de 10 m/s durante 8 segundos.",q:"Qual distância ele percorre em MRU?",o:["18 m","40 m","80 m","100 m"],c:2},
    {base:"Um objeto é abandonado em queda livre, desprezando o ar.",q:"Sua velocidade:",o:["Permanece constante","Aumenta com o tempo","Diminui com o tempo","É sempre zero"],c:1},
    {base:"No SI, a unidade de velocidade é:",q:"Qual alternativa apresenta a unidade correta?",o:["m/s","kg","N","J"],c:0},
    {base:"Um trem percorre 300 m em 10 s.",q:"Sua velocidade média é:",o:["20 m/s","25 m/s","30 m/s","35 m/s"],c:2},
    {base:"Um corpo muda sua posição com o passar do tempo.",q:"Isso indica que ele está em:",o:["Repouso absoluto","Movimento","Equilíbrio térmico","Condensação"],c:1}
  ]),

  "Dinâmica": gerarAreaBase("Dinâmica", [
    {base:"A dinâmica estuda as causas dos movimentos.",q:"A grandeza associada à causa da aceleração é:",o:["Força","Temperatura","Volume","Densidade"],c:0},
    {base:"Pela segunda lei de Newton, F = m · a.",q:"Um corpo de 5 kg recebe aceleração de 2 m/s². A força resultante é:",o:["5 N","7 N","10 N","20 N"],c:2},
    {base:"Um corpo permanece em repouso ou MRU se a força resultante for nula.",q:"Essa ideia corresponde à:",o:["Primeira lei de Newton","Segunda lei de Newton","Lei de Ohm","Lei de Snell"],c:0},
    {base:"A ação e reação ocorrem em pares de forças.",q:"A terceira lei de Newton afirma que:",o:["Forças surgem isoladas","Toda ação tem reação de mesma intensidade e sentido oposto","A força depende da temperatura","Todo corpo cai igual sem gravidade"],c:1},
    {base:"Peso é a força gravitacional que atua sobre um corpo.",q:"Um corpo de massa 10 kg na Terra, com g=10 m/s², tem peso:",o:["10 N","50 N","100 N","1000 N"],c:2},
    {base:"Atrito é uma força que se opõe ao movimento relativo entre superfícies.",q:"A força de atrito geralmente atua:",o:["A favor do movimento sempre","Contrária ao deslizamento","Sem contato","Só no vácuo"],c:1},
    {base:"A massa mede a quantidade de matéria de um corpo.",q:"No SI, a unidade de massa é:",o:["Newton","Joule","Quilograma","Metro"],c:2},
    {base:"A força é medida em newtons.",q:"1 newton corresponde a:",o:["kg/m","kg·m/s²","m/s","J/s"],c:1},
    {base:"Quando duas forças iguais e opostas atuam no mesmo corpo, a resultante é:",q:"Qual é a resultante?",o:["Zero","O dobro","Metade","Infinita"],c:0},
    {base:"Uma força de 30 N atua em corpo de 10 kg.",q:"A aceleração produzida é:",o:["2 m/s²","3 m/s²","4 m/s²","5 m/s²"],c:1}
  ])
};

function irParaPremium(){
  window.location.href = PREMIUM_URL;
}

function mostrarMenu(){
  pararAudioFundo();

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue);margin-bottom:8px;">Escolha um módulo de Física</h2>
      <p class="mini">No teste grátis você libera <strong>2 módulos</strong>. Os demais ficam bloqueados para levar ao premium.</p>

      <div class="grid-areas">
        ${areas.map(area=>`
          <div class="card-area ${area.liberada ? "" : "locked"}">
            <h3>${area.liberada ? area.nome : "🔒 " + area.nome}</h3>
            <p>${area.descricao}</p>
            <button class="btn ${area.liberada ? "" : "btn-lock"}" onclick="${area.liberada ? `iniciarArea('${area.nome.replace(/'/g,"\\'")}')` : `mostrarBloqueio()`}">
              ${area.liberada ? "Entrar neste módulo" : "Desbloquear no premium"}
            </button>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function mostrarBloqueio(){
  pararAudioFundo();

  app.innerHTML = `
    <div class="lock-box">
      <h2>🔒 MÓDULO PREMIUM</h2>
      <p>Esse módulo está disponível apenas na versão completa do simulado de Física.</p>
      <p>No premium você desbloqueia todos os módulos e continua seu treinamento completo.</p>
      <button class="btn btn-premium" onclick="irParaPremium()">LIBERAR ACESSO COMPLETO</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">VOLTAR AO MENU</button>
    </div>
  `;
}

async function iniciarArea(nomeArea){
  await destravarAudio();
  areaAtual = nomeArea;
  questoesAtuais = bancoQuestoes[nomeArea] || [];
  indiceQuestao = 0;
  acertosObjetivas = 0;
  questaoRenderizadaAtual = null;

  if(!questoesAtuais.length){
    app.innerHTML = `
      <div class="box">
        <h2 style="color:var(--red);">Erro ao abrir o módulo</h2>
        <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
      </div>
    `;
    return;
  }

  setTimeout(()=>{tocarAudioFundo();},120);
  carregarQuestao();
}

function montarEnunciado(questao){
  return `
    <span class="question-label">Base para resolução:</span>
    <span class="text-base">${questao.base}</span>
    <span class="question-label">Pergunta:</span>
    ${questao.q}
  `;
}

function carregarQuestao(){
  const questao = questoesAtuais[indiceQuestao];
  const total = questoesAtuais.length;
  questaoRenderizadaAtual = embaralharAlternativas(questao);

  let html = `
    <div class="box">
      <div class="status">
        <span>${areaAtual}</span>
        <span>Questão ${indiceQuestao + 1}/${total}</span>
      </div>
      <div id="question-text">${montarEnunciado(questaoRenderizadaAtual)}</div>
      <div class="options-wrap">
  `;

  questaoRenderizadaAtual.opcoesRenderizadas.forEach((alt,idx)=>{
    html += `<button class="btn option-btn" onclick="responderObjetiva(${idx})">${alt}</button>`;
  });

  html += `
      </div>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;

  app.innerHTML = html;
}

function responderObjetiva(escolhida){
  const botoes = document.querySelectorAll(".option-btn");
  const correta = questaoRenderizadaAtual.corretaRenderizada;

  botoes.forEach((btn,idx)=>{
    btn.disabled = true;
    if(idx === correta) btn.classList.add("correct");
  });

  if(escolhida === correta){
    acertosObjetivas++;
    tocarAcerto();
  }else{
    if(botoes[escolhida]) botoes[escolhida].classList.add("wrong");
    tocarErro();
  }

  setTimeout(()=>{
    indiceQuestao++;
    if(indiceQuestao < questoesAtuais.length){
      carregarQuestao();
    }else{
      finalizarArea();
    }
  },900);
}

function finalizarArea(){
  pararAudioFundo();

  const notaFinal = acertosObjetivas * 10;
  const totalPossivel = 200;
  let feedback = "Você concluiu apenas uma parte do simulado completo (200 pontos). Desbloqueie o premium para acessar todas as disciplinas.";

  if(notaFinal >= 80) feedback += " Ótimo resultado no teste grátis. Você já pode avançar para o premium.";
  else if(notaFinal >= 50) feedback += " Bom começo. No premium você treina o restante dos módulos.";
  else feedback += " Esse teste já mostrou onde melhorar. O premium ajuda a evoluir com treino completo.";

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue);">${areaAtual}</h2>
      <div class="result-number">${notaFinal}/${totalPossivel}</div>
      <div class="result-sub">Acertos: ${acertosObjetivas}/10</div>
      <p class="mini" style="margin-bottom:18px;">${feedback}</p>

      <button class="btn btn-premium" onclick="irParaPremium()">DESBLOQUEAR VERSÃO COMPLETA</button>
      <button class="btn" onclick="iniciarArea('${areaAtual.replace(/'/g,"\\'")}')">Refazer este módulo</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;
}

mostrarMenu();
</script>

</body>
</html>
